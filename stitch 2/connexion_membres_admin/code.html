<!DOCTYPE html>

<html class="light" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<style>.material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24
    }
.bg-pattern {
    background-color: #01261f;
    background-image: linear-gradient(rgba(1, 38, 31, 0.85), rgba(1, 38, 31, 0.95)), url(https://lh3.googleusercontent.com/aida-public/AB6AXuDKAAQkhWShRQSd7oyKFE9FkpcGzerw47h81DI9JMSvRLCGrUMD3fIHVLbeFlfzQI1Mg_SU4p9vH0F2VTi4GamaHwlqW1OAPsp9TpCX4-ZJPrXD95PkUCICgSq7ax68_-rVSZNjFDV1iLvl-_cA_pLQtgSe6JNILOGvrfOlgyluWqgeVwNA-fBu4KyQzpUZRS5Mz78ZFV2x344bJLsGeWN6keHYAU-0pZza1Jp5pGdD0F2e73NucQ2dawXox1PwBSqaC7VkK7MthGM);
    background-size: cover;
    background-position: center
    }
.glass-card {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255, 255, 255, 0.1)
    }</style>
</head>
<body class="font-body text-on-background bg-pattern min-h-screen flex items-center justify-center p-6" data-alt="Atmospheric view of a luxury clay tennis court surrounded by tropical palm trees in Martinique during sunset, high contrast deep greens and warm ochre tones.">
<main class="w-full max-w-lg">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-10">
<div class="w-20 h-20 bg-secondary rounded-xl flex items-center justify-center shadow-Ambient mb-4">
<span class="material-symbols-outlined text-white text-5xl" data-icon="sports_tennis">sports_tennis</span>
</div>
<h1 class="font-headline text-3xl font-extrabold text-white tracking-tighter text-center">
                Tennis Club du François
            </h1>
<p class="text-on-primary-fixed-variant font-medium tracking-wide mt-2 text-sm uppercase">Espace Membre</p>
</div>
<!-- Login Card -->
<div class="glass-card rounded-xl p-8 md:p-12 shadow-Ambient">
<form action="#" class="space-y-6" method="POST">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-white font-label text-sm font-semibold ml-1" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant text-xl">mail</span>
<input class="w-full bg-white/10 border-none rounded-full py-4 pl-12 pr-6 text-white placeholder-outline-variant focus:ring-2 focus:ring-secondary-fixed transition-all outline-none font-body" id="email" name="email" placeholder="votre@email.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="block text-white font-label text-sm font-semibold ml-1" for="password">Mot de passe</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant text-xl">lock</span>
<input class="w-full bg-white/10 border-none rounded-full py-4 pl-12 pr-12 text-white placeholder-outline-variant focus:ring-2 focus:ring-secondary-fixed transition-all outline-none font-body" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant hover:text-white transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end">
<a class="text-secondary-fixed-dim text-xs font-semibold hover:text-white transition-colors tracking-wide" href="#">
                        Mot de passe oublié?
                    </a>
</div>
<!-- Submit Button -->
<button class="w-full bg-secondary hover:bg-on-secondary-container text-white font-headline font-bold py-4 rounded-full shadow-lg transform active:scale-95 transition-all duration-300" type="submit">
                    Se connecter
                </button>
</form>
<!-- Footer Links -->
<div class="mt-10 pt-8 border-t border-white/10 text-center">
<p class="text-outline-variant text-sm font-medium">
                    Pas encore membre? 
                    <a class="text-secondary-fixed ml-1 font-bold hover:underline transition-all" href="#">
                        Créer un compte
                    </a>
</p>
</div>
</div>
<!-- Support Info -->
<footer class="mt-8 text-center">
<div class="flex items-center justify-center space-x-6">
<a class="text-white/40 hover:text-white text-xs font-medium transition-colors flex items-center" href="#">
<span class="material-symbols-outlined text-sm mr-1">help</span>
                    Aide
                </a>
<span class="w-1 h-1 bg-white/20 rounded-full"></span>
<a class="text-white/40 hover:text-white text-xs font-medium transition-colors flex items-center" href="#">
<span class="material-symbols-outlined text-sm mr-1">policy</span>
                    Confidentialité
                </a>
</div>
<p class="text-white/20 text-[10px] mt-6 tracking-widest uppercase">© 2024 Club de Tennis du François - Martinique</p>
</footer>
</main>
</body></html>
